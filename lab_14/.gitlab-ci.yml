stages:
  - test
  - build
  - docker

variables:
  GO_VERSION: "1.26.1"

test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  script:
    - go test ./...

build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - go build -o app .
  artifacts:
    paths:
      - app
    expire_in: 1 hour

docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  only:
    - main